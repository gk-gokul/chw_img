<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Champagne Pop - Realistic Canvas</title>
<style>
    html, body {
        margin: 0; padding: 0;
        height: 100%; overflow: hidden;
        background: #0a0a0f;
        font-family: sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    canvas {
        width: 500px;
        height: 850px;
        background: radial-gradient(circle at 50% 25%, #1a1a20, #050508 70%);
        border-radius: 20px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.7);
    }
</style>
</head>
<body>

<canvas id="scene" width="500" height="850"></canvas>

<script>
const canvas = document.getElementById("scene");
const ctx = canvas.getContext("2d");

let W = canvas.width;
let H = canvas.height;

let particles = [];
let cork = null;
let popped = false;

// Bottle dimensions
const bottle = {
    x: W/2,
    y: H*0.88,
    bodyW: 160,
    bodyH: 430,
    neckW: 70,
    neckH: 130
};

// ---------------------- CORK -------------------------
function createCork() {
    cork = {
        x: bottle.x,
        y: bottle.y - bottle.bodyH - bottle.neckH + 20,
        vx: (Math.random()*80 - 40),
        vy: -600 - Math.random()*150,
        r: 22,
        rot: 0,
        vr: (Math.random()*4 - 2),
        alive: true
    };
}

function updateCork(dt) {
    if (!cork) return;

    cork.vy += 600 * dt;
    cork.x += cork.vx * dt;
    cork.y += cork.vy * dt;
    cork.rot += cork.vr * dt;

    if (cork.y > H + 50) cork.alive = false;
}

function drawCork() {
    if (!cork) return;
    ctx.save();
    ctx.translate(cork.x, cork.y);
    ctx.rotate(cork.rot);
    ctx.fillStyle = "#c89f72";
    ctx.beginPath();
    ctx.ellipse(0,0,cork.r*1.2,cork.r*0.9,0,0,Math.PI*2);
    ctx.fill();

    ctx.fillStyle = "#9b6f47";
    for (let i=0;i<15;i++){
        const px = (Math.random()-0.5)*20;
        const py = (Math.random()-0.5)*20;
        ctx.beginPath();
        ctx.arc(px,py,2,0,Math.PI*2);
        ctx.fill();
    }
    ctx.restore();
}

// ----------------- PARTICLES (foam/mist/sparkles) -------------------
function addParticles() {
    const cx = bottle.x;
    const cy = bottle.y - bottle.bodyH - bottle.neckH;

    for (let i=0;i<80;i++) {
        const a = -Math.PI/2 + (Math.random()-0.5)*0.4;
        const sp = 300 + Math.random()*300;

        particles.push({
            x: cx, y: cy,
            vx: Math.cos(a)*sp,
            vy: Math.sin(a)*sp,
            life: 0,
            max: 0.8 + Math.random()*0.6,
            type: "foam",
            r: 2 + Math.random()*4
        });
    }

    for (let i=0;i<100;i++) {
        const a = -Math.PI/2 + (Math.random()-0.5)*0.6;
        const sp = 200 + Math.random()*200;
        particles.push({
            x: cx, y: cy,
            vx: Math.cos(a)*sp,
            vy: Math.sin(a)*sp,
            life: 0,
            max: 0.6 + Math.random()*0.4,
            type: "mist",
            r: 2
        });
    }

    for (let i=0;i<30;i++) {
        const a = Math.random()*Math.PI - Math.PI/2;
        const sp = 150 + Math.random()*100;
        particles.push({
            x: cx, y: cy,
            vx: Math.cos(a)*sp,
            vy: Math.sin(a)*sp,
            life: 0,
            max: 0.6 + Math.random()*0.5,
            type: "spark",
            r: 2
        });
    }
}

function updateParticles(dt) {
    particles = particles.filter(p => p.life < p.max);

    for (let p of particles) {
        p.life += dt;
        p.vy += 500 * dt;
        p.x += p.vx * dt;
        p.y += p.vy * dt;
    }
}

function drawParticles() {
    for (let p of particles) {
        let t = p.life / p.max;

        if (p.type === "foam") {
            ctx.fillStyle = `rgba(255,255,255,${1-t})`;
            ctx.beginPath();
            ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
            ctx.fill();
        } 
        else if (p.type === "mist") {
            const g = ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r*6);
            g.addColorStop(0,`rgba(255,255,255,${0.6*(1-t)})`);
            g.addColorStop(1,"rgba(255,255,255,0)");
            ctx.fillStyle = g;
            ctx.beginPath();
            ctx.arc(p.x,p.y,p.r*6,0,Math.PI*2);
            ctx.fill();
        }
        else if (p.type === "spark") {
            const g = ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,10);
            g.addColorStop(0,`rgba(255,230,130,${1-t})`);
            g.addColorStop(1,"rgba(255,230,130,0)");
            ctx.fillStyle = g;
            ctx.beginPath();
            ctx.arc(p.x,p.y,10,0,Math.PI*2);
            ctx.fill();
        }
    }
}

// ---------------------- DRAW BOTTLE -------------------------
function drawBottle() {
    ctx.save();
    ctx.translate(bottle.x, bottle.y);

    // SHADOW
    ctx.beginPath();
    ctx.ellipse(0,15,bottle.bodyW*0.8,30,0,0,Math.PI*2);
    ctx.fillStyle = "rgba(0,0,0,0.7)";
    ctx.fill();

    // BODY
    const g1 = ctx.createLinearGradient(0,-bottle.bodyH,0,0);
    g1.addColorStop(0,"#0d3e27");
    g1.addColorStop(1,"#03140b");
    ctx.fillStyle = g1;
    ctx.beginPath();
    ctx.ellipse(0,-bottle.bodyH/2,bottle.bodyW/2,bottle.bodyH/2,0,0,Math.PI*2);
    ctx.fill();

    // LABEL
    ctx.fillStyle = "#f3e6c5";
    ctx.strokeStyle = "#795c30";
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.roundRect(-70,-260,140,90,15);
    ctx.fill();
    ctx.stroke();

    // Neck
    ctx.fillStyle = "#052015";
    ctx.fillRect(-bottle.neckW/2, -bottle.bodyH - bottle.neckH, bottle.neckW, bottle.neckH);

    // Foil
    const gf = ctx.createLinearGradient(0,-bottle.bodyH-bottle.neckH,0,-bottle.bodyH-bottle.neckH+90);
    gf.addColorStop(0,"#fcd978");
    gf.addColorStop(1,"#c39232");
    ctx.fillStyle = gf;
    ctx.fillRect(-bottle.neckW/2-10, -bottle.bodyH-bottle.neckH, bottle.neckW+20, 90);

    ctx.restore();
}

// ---------------------- MAIN LOOP -------------------------
let last = 0;
function loop(ts) {
    const dt = (ts-last)/1000;
    last = ts;

    ctx.clearRect(0,0,W,H);

    drawBottle();

    if (popped) {
        updateCork(dt);
        updateParticles(dt);
        drawParticles();
        drawCork();
    }

    requestAnimationFrame(loop);
}

canvas.addEventListener("click", () => {
    if (!popped) {
        popped = true;
        createCork();
        addParticles();
    }
});

requestAnimationFrame(loop);
</script>

</body>
</html>
